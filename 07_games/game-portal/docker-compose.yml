services:
  # 메인 웹 사이트 (포트 8080)
  retro-games:
    image: nginx:alpine
    container_name: retro-games
    ports:
      - "8080:80"
    # Dockerfile 없이 로컬 index.html을 컨테이너 안에 다이렉트로 주입하는 설정
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    restart: always

  # 각 게임들에게 독립된 외부 로컬 포트를 매핑해 줍니다.
  pacman:
    image: 121896/game-pacman:1.0
    container_name: game-pacman-service
    ports:
      - "8081:80"
    restart: always

  tetris:
    image: 121896/game-tetris:1.0
    container_name: game-tetris-service
    ports:
      - "8082:80"
    restart: always

  mario:
    image: 121896/game-mario:1.0
    container_name: game-mario-service
    ports:
      - "8083:80"
    restart: always

  spaceinvaders:
    image: 121896/game-spaceinvaders:1.0
    container_name: game-spaceinvaders-service
    ports:
      - "8084:80"
    restart: always