<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레트로 게임</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 50px;
            font-size: 3rem;
            text-shadow: 2px 2px #ff0055;
            letter-spacing: 2px;
        }
        .game-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .game-card {
            background: #2a2a2a;
            border: 3px solid #333;
            border-radius: 15px;
            padding: 25px;
            width: 150px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .game-card:hover {
            transform: translateY(-10px);
            border-color: #ff0055;
            box-shadow: 0 10px 25px rgba(255, 0, 85, 0.4);
        }
        .game-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            display: block;
        }
        .game-title {
            font-size: 1.1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>레트로 게임</h1>

    <div class="game-container">
        <a href="http://localhost:8081" target="_blank" class="game-card">
            <span class="game-icon">🍕</span>
            <div class="game-title">PACMAN</div>
        </a>

        <a href="http://localhost:8082" target="_blank" class="game-card">
            <span class="game-icon">🧱</span>
            <div class="game-title">TETRIS</div>
        </a>

        <a href="http://localhost:8083" target="_blank" class="game-card">
            <span class="game-icon">🍄</span>
            <div class="game-title">SUPER MARIO</div>
        </a>

        <a href="http://localhost:8084" target="_blank" class="game-card">
            <span class="game-icon">👾</span>
            <div class="game-title">SPACE INVADERS</div>
        </a>
    </div>

</body>
</html>
